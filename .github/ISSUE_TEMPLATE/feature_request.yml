name: Feature request
description: Suggest a scoped improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Android client
        - ASR
        - TTS
        - Vision/image
        - Parent controls
        - Safety/prompting
        - Documentation
        - Tooling/CI
        - Other
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety and privacy checks
      options:
        - label: This feature does not require real child data in public tests or docs.
        - label: This feature keeps provider credentials server-side.
        - label: This feature avoids addictive, secrecy, or "only friend" child-facing patterns.
