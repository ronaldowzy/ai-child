services:
  postgres:
    image: postgres:16
    container_name: child-ai-postgres-local
    environment:
      POSTGRES_USER: child_ai
      POSTGRES_PASSWORD: child_ai
      POSTGRES_DB: child_ai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U child_ai -d child_ai_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
